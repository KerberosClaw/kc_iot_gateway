<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kc_iot_gateway</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #222; margin-bottom: 20px; }
  header h1 { font-size: 20px; color: #4ade80; }
  .status { font-size: 13px; padding: 4px 12px; border-radius: 12px; }
  .status.online { background: #166534; color: #4ade80; }
  .status.offline { background: #7f1d1d; color: #fca5a5; }

  .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .tab { padding: 8px 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 14px; color: #888; }
  .tab.active { background: #222; color: #4ade80; border-bottom-color: #222; }

  .panel { display: none; }
  .panel.active { display: block; }

  .card { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .card-title { font-size: 15px; font-weight: 600; }
  .protocol-badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #1e3a5f; color: #60a5fa; }

  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot.green { background: #4ade80; }
  .dot.red { background: #ef4444; }

  .fields { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
  .field { background: #1a1a1a; padding: 10px; border-radius: 6px; }
  .field-name { font-size: 11px; color: #666; text-transform: uppercase; }
  .field-value { font-size: 22px; font-weight: 700; color: #fff; margin-top: 4px; }
  .field-unit { font-size: 13px; color: #888; margin-left: 2px; }

  .alert-item { padding: 10px; border-left: 3px solid; margin-bottom: 6px; background: #141414; border-radius: 0 6px 6px 0; }
  .alert-item.critical { border-color: #ef4444; }
  .alert-item.warning { border-color: #f59e0b; }
  .alert-item.info { border-color: #3b82f6; }
  .alert-time { font-size: 11px; color: #666; }
  .alert-msg { font-size: 13px; margin-top: 4px; }

  .rule-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #141414; border: 1px solid #222; border-radius: 6px; margin-bottom: 6px; }
  .rule-name { font-weight: 600; }
  .rule-severity { font-size: 11px; padding: 2px 6px; border-radius: 3px; }
  .rule-severity.critical { background: #7f1d1d; color: #fca5a5; }
  .rule-severity.warning { background: #78350f; color: #fcd34d; }
  .rule-severity.info { background: #1e3a5f; color: #93c5fd; }

  .toggle { position: relative; width: 40px; height: 22px; background: #333; border-radius: 11px; cursor: pointer; }
  .toggle.active { background: #166534; }
  .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: 0.2s; }
  .toggle.active::after { left: 20px; }

  /* Webhook Simulator */
  .sim-form { display: flex; flex-direction: column; gap: 12px; }
  .sim-select, .sim-input { padding: 8px 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; font-size: 14px; }
  .sim-btn { padding: 10px 24px; background: #166534; color: #4ade80; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
  .sim-btn:hover { background: #15803d; }
  .sim-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .sim-field-label { font-size: 12px; color: #888; }
  .sim-result { margin-top: 12px; padding: 10px; background: #1a1a1a; border-radius: 6px; font-family: monospace; font-size: 12px; white-space: pre-wrap; }

  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #ccc; }
  .empty { color: #555; font-size: 13px; padding: 20px; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>kc_iot_gateway</h1>
    <span class="status" id="conn-status">Connecting...</span>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('devices')">Devices</div>
    <div class="tab" onclick="switchTab('alerts')">Alerts</div>
    <div class="tab" onclick="switchTab('rules')">Rules</div>
    <div class="tab" onclick="switchTab('webhook-sim')">Webhook Simulator</div>
  </div>

  <div id="devices" class="panel active"></div>
  <div id="alerts" class="panel"></div>
  <div id="rules" class="panel"></div>
  <div id="webhook-sim" class="panel"></div>
</div>

<script>
const API = '';
let ws;
let devices = {};
let fieldDefs = {};

// --- Tab ---
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
  document.getElementById(name).classList.add('active');
  if (name === 'alerts') loadAlerts();
  if (name === 'rules') loadRules();
  if (name === 'webhook-sim') loadWebhookSim();
}

// --- WebSocket ---
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => {
    document.getElementById('conn-status').textContent = 'Online';
    document.getElementById('conn-status').className = 'status online';
  };
  ws.onclose = () => {
    document.getElementById('conn-status').textContent = 'Offline';
    document.getElementById('conn-status').className = 'status offline';
    setTimeout(connectWS, 3000);
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'init') {
      msg.devices.forEach(d => { devices[d.device_id] = d; });
      renderDevices();
    } else if (msg.type === 'device_update') {
      if (devices[msg.device_id]) {
        Object.assign(devices[msg.device_id].fields, msg.data);
        devices[msg.device_id].online = true;
      }
      renderDevices();
    }
  };
}

// --- Render Devices ---
function renderDevices() {
  const el = document.getElementById('devices');
  if (!Object.keys(devices).length) {
    el.innerHTML = '<div class="empty">No devices connected</div>';
    return;
  }
  el.innerHTML = Object.values(devices).map(d => `
    <div class="card">
      <div class="card-header">
        <div>
          <span class="dot ${d.online ? 'green' : 'red'}"></span>
          <span class="card-title">${d.name || d.device_id}</span>
          <span style="color:#666;font-size:12px;margin-left:8px">${d.device_id}</span>
        </div>
        <span class="protocol-badge">${d.protocol}</span>
      </div>
      <div class="fields">
        ${Object.entries(d.fields || {}).map(([k, v]) => `
          <div class="field">
            <div class="field-name">${k}</div>
            <div class="field-value">${typeof v === 'number' ? (Number.isInteger(v) ? v : v.toFixed(2)) : v}<span class="field-unit"></span></div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// --- Alerts ---
async function loadAlerts() {
  const resp = await fetch(`${API}/api/alerts?limit=30`);
  const alerts = await resp.json();
  const el = document.getElementById('alerts');
  if (!alerts.length) { el.innerHTML = '<div class="empty">No alerts yet</div>'; return; }
  el.innerHTML = '<div class="section-title">Recent Alerts</div>' + alerts.map(a => `
    <div class="alert-item ${a.severity}">
      <div class="alert-time">${new Date(a.created_at * 1000).toLocaleString()}</div>
      <div class="alert-msg"><strong>${a.rule_name}</strong> — ${a.device_id}: ${a.message}</div>
    </div>
  `).join('');
}

// --- Rules ---
async function loadRules() {
  const resp = await fetch(`${API}/api/rules`);
  const rules = await resp.json();
  const el = document.getElementById('rules');
  if (!rules.length) { el.innerHTML = '<div class="empty">No rules configured</div>'; return; }
  el.innerHTML = '<div class="section-title">Alert Rules</div>' + rules.map(r => `
    <div class="rule-item">
      <div>
        <span class="rule-name">${r.name}</span>
        <span class="rule-severity ${r.severity}">${r.severity}</span>
        <span style="color:#666;font-size:12px;margin-left:8px">${r.description || ''}</span>
      </div>
      <div class="toggle ${r.active ? 'active' : ''}" onclick="toggleRule('${r.name}')"></div>
    </div>
  `).join('');
}

async function toggleRule(name) {
  await fetch(`${API}/api/rules/${name}/toggle`, { method: 'PATCH' });
  loadRules();
}

// --- Webhook Simulator ---
async function loadWebhookSim() {
  const el = document.getElementById('webhook-sim');
  let devicesResp;
  try {
    devicesResp = await (await fetch(`${API}/api/webhook-devices`)).json();
  } catch { devicesResp = []; }

  if (!devicesResp.length) {
    el.innerHTML = '<div class="empty">No webhook devices configured</div>';
    return;
  }

  el.innerHTML = `
    <div class="section-title">Webhook Simulator</div>
    <div class="card">
      <div class="sim-form">
        <select class="sim-select" id="sim-device" onchange="updateSimFields()">
          ${devicesResp.map(d => `<option value="${d.id}" data-fields='${JSON.stringify(d.fields)}' data-identity='${JSON.stringify(d.identity)}'>${d.name} (${d.id})</option>`).join('')}
        </select>
        <div class="sim-fields" id="sim-fields"></div>
        <button class="sim-btn" onclick="sendWebhook()">Send Webhook</button>
        <div class="sim-result" id="sim-result" style="display:none"></div>
      </div>
    </div>
  `;
  updateSimFields();
}

function updateSimFields() {
  const sel = document.getElementById('sim-device');
  const opt = sel.options[sel.selectedIndex];
  const fields = JSON.parse(opt.dataset.fields);
  const container = document.getElementById('sim-fields');

  container.innerHTML = Object.entries(fields).map(([name, cfg]) => {
    let input;
    if (cfg.type === 'float') input = `<input class="sim-input" id="sim-${name}" type="number" step="0.1" value="${(20 + Math.random() * 10).toFixed(1)}">`;
    else if (cfg.type === 'int') input = `<input class="sim-input" id="sim-${name}" type="number" value="${Math.floor(50 + Math.random() * 50)}">`;
    else if (cfg.type === 'bool') input = `<select class="sim-select" id="sim-${name}"><option value="true">true</option><option value="false">false</option></select>`;
    else input = `<input class="sim-input" id="sim-${name}" type="text" value="open">`;
    return `<div><div class="sim-field-label">${name} (${cfg.type})</div>${input}</div>`;
  }).join('');
}

async function sendWebhook() {
  const sel = document.getElementById('sim-device');
  const opt = sel.options[sel.selectedIndex];
  const fields = JSON.parse(opt.dataset.fields);
  const identity = JSON.parse(opt.dataset.identity);

  // 建構符合 identity 結構的 payload
  const payload = {};

  // 設定 identity 欄位
  const idPath = identity.field.replace('$.', '').split('.');
  let obj = payload;
  for (let i = 0; i < idPath.length - 1; i++) {
    obj[idPath[i]] = obj[idPath[i]] || {};
    obj = obj[idPath[i]];
  }
  obj[idPath[idPath.length - 1]] = identity.value;

  // 設定 data 欄位
  for (const [name, cfg] of Object.entries(fields)) {
    const el = document.getElementById(`sim-${name}`);
    let val = el.value;
    if (cfg.type === 'float') val = parseFloat(val);
    else if (cfg.type === 'int') val = parseInt(val);
    else if (cfg.type === 'bool') val = val === 'true';

    const dataPath = cfg.path.replace('$.', '').split('.');
    let target = payload;
    for (let i = 0; i < dataPath.length - 1; i++) {
      target[dataPath[i]] = target[dataPath[i]] || {};
      target = target[dataPath[i]];
    }
    target[dataPath[dataPath.length - 1]] = val;
  }

  const resultEl = document.getElementById('sim-result');
  try {
    const resp = await fetch(`${API}/webhook`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    resultEl.style.display = 'block';
    resultEl.textContent = `Sent:\n${JSON.stringify(payload, null, 2)}\n\nResponse:\n${JSON.stringify(data, null, 2)}`;
  } catch (e) {
    resultEl.style.display = 'block';
    resultEl.textContent = `Error: ${e.message}`;
  }
}

// --- Init ---
connectWS();
</script>
</body>
</html>
